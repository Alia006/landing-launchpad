<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing-launchpad</title>

    <!-- google fonts link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- favicon link -->
    <link rel="shortcut icon" href="Assets/images/landing.png" type="image/x-icon">
    
    <!-- css link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header section start -->
    <header class="header">
        <nav>
            <h3 class="logo inter-font primary-color">LOGO</h3>
                <button class="btn-primary raleway-font ">Sign Up</button>
        </nav>
        <div class="hero-section">
            <h1 class="hero-title raleway-font">Cool Dark UI Template for <br> Webflow Agencies!</h1>
            <button class="btn-primary raleway-font ">Stay Focused</button>
        </div>
    </header>
    <!-- main section start -->
    <main>
        <!-- action section start -->
         <section class="action-section">
            <div>
                <h2 class="section-title inter-font">See It in Action</h2>
                <p class="section-description inter-font">Explore the live preview and image your brand in this bold new look</p>
                <button class="btn-primary">Launch Live Preview</button>
            </div>
            <img src="Assets/images/wc-mini.png" alt="webflow" class="webflow-img">
         </section>
         <!-- user section -->
          <section class="users-section">
            <div class="user-section-container">
                <h2 class="section-title">Joined Thousands of Productive Users</h2>
            <div class="users-container">
                <div>
                    <h3 class="users inter-font">50K</h3>
                    <p class="user-description inter-font">Active Users</p>
                </div>
                <div>
                    <h3 class="users inter-font">2M+</h3>
                    <p class="user-description inter-font">Focus Sessions</p>
                </div>
                <div>
                    <h3 class="users inter-font">95%</h3>
                    <p class="user-description inter-font">Satisfaction Rate</p>
                </div>
            </div>
            </div>
          </section>
    </main>
    <!--Footer section start -->
    <footer>

    </footer>
</body>
</html>
